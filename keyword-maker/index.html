<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 키워드 분해 도구</title>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F9FAFB;
            --border: #E5E7EB;
            --text: #111827;
            --text-light: #6B7280;
            --white: #FFFFFF;
            --overlay-bg: rgba(255, 255, 255, 0.8);
        }
        body.dark-mode {
            --primary: #6366F1;
            --primary-hover: #818CF8;
            --bg: #111827;
            --border: #374151;
            --text: #F9FAFB;
            --text-light: #9CA3AF;
            --white: #1F2937;
            --overlay-bg: rgba(17, 24, 39, 0.8);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        input, textarea {
            background: var(--white);
            color: var(--text);
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--text);
        }
        .header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dict-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .dict-container input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .api-key-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .api-key-container input {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 250px;
        }
        .main-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            resize: vertical;
            font-family: inherit;
            box-sizing: border-box;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--primary-hover); }
        .btn-outline {
            background: var(--white);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { background: var(--bg); }
        .btn-full { width: 100%; padding: 0.75rem; font-size: 1rem; }
        
        .sortable-container {
            min-height: 120px;
            border: 1px dashed var(--border);
            border-radius: 6px;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-content: flex-start;
            background: #F3F4F6;
        }
        .word-block {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            font-size: 0.95rem;
        }
        .word-block:active { cursor: grabbing; }
        .word-block-ghost { opacity: 0.4; }
        
        .editable-box {
            min-height: 100px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            font-size: 1.1rem;
            line-height: 1.5;
            outline: none;
            white-space: pre-wrap;
            word-break: break-all;
            box-sizing: border-box;
        }
        .editable-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .char-count {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .char-count.warning { color: #DC2626; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div>AI가 키워드를 분석 중입니다...</div>
</div>

<div class="container">
    <div class="header">
        <div class="header-top">
            <h1>AI 키워드 분해 도구</h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button class="btn btn-outline" id="btn-dark-mode" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">🌙 다크 모드</button>
                <div class="api-key-container">
                    <label for="api-key">Gemini API Key</label>
                    <input type="password" id="api-key" placeholder="AI-...">
                </div>
            </div>
        </div>
        <div class="dict-container">
            <label for="protected-dict">분해 방지 단어 사전 (쉼표로 구분)</label>
            <input type="text" id="protected-dict" placeholder="예: 먼지털이개, 보조배터리, 맥세이프">
        </div>
    </div>

    <div class="main-grid">
        <!-- Left Panel: Input -->
        <div class="panel">
            <h2 class="panel-title">1. 키워드 입력</h2>
            <textarea id="input-keywords" placeholder="여기에 키워드를 입력하세요.&#10;(엔터 또는 컴마로 구분)&#10;&#10;예시:&#10;클리어파일&#10;A4파일철,서류정리파일"></textarea>
            
            <div class="toolbar">
                <button class="btn btn-outline" id="btn-remove-empty">정리</button>
                <button class="btn btn-outline" id="btn-enter-to-comma">컴마 변환</button>
                <button class="btn btn-outline" id="btn-copy-input">복사</button>
            </div>
            
            <button class="btn btn-full" id="btn-ai-decompose">AI 단어 분해 실행</button>
        </div>

        <!-- Right Panel: Output -->
        <div class="panel">
            <h2 class="panel-title">2. 분해된 단어 편집</h2>
            
            <div class="sortable-container" id="sortable-list">
                <!-- Word blocks will be inserted here -->
            </div>
            
            <h2 class="panel-title" style="margin-top: 1rem;">3. 최종 결과 (레터박스)</h2>
            <div class="editable-box" id="editable-text" contenteditable="true" spellcheck="false" placeholder="단어들이 여기에 조합됩니다..."></div>
            
            <div class="footer-row">
                <span class="char-count" id="char-count">글자수: 0자</span>
                <button class="btn btn-outline" id="btn-copy-output">결과 복사</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Elements
    const apiKeyInput = document.getElementById('api-key');
    const inputKeywords = document.getElementById('input-keywords');
    const sortableList = document.getElementById('sortable-list');
    const editableText = document.getElementById('editable-text');
    const charCount = document.getElementById('char-count');
    const loading = document.getElementById('loading');

    const protectedDictInput = document.getElementById('protected-dict');
    const btnDarkMode = document.getElementById('btn-dark-mode');

    // Dark Mode Logic
    const isDarkMode = localStorage.getItem('darkMode') === 'true';
    if (isDarkMode) {
        document.body.classList.add('dark-mode');
        btnDarkMode.textContent = '☀️ 라이트 모드';
    }
    btnDarkMode.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const darkActive = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', darkActive);
        btnDarkMode.textContent = darkActive ? '☀️ 라이트 모드' : '🌙 다크 모드';
    });

    // Load API Key & Dict
    apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';
    apiKeyInput.addEventListener('input', () => {
        localStorage.setItem('geminiApiKey', apiKeyInput.value.trim());
    });
    
    protectedDictInput.value = localStorage.getItem('protectedDict') || '';
    protectedDictInput.addEventListener('input', () => {
        localStorage.setItem('protectedDict', protectedDictInput.value);
    });

    // Toolbar actions
    document.getElementById('btn-remove-empty').addEventListener('click', () => {
        const lines = inputKeywords.value.split('\n').map(l => l.trim()).filter(Boolean);
        inputKeywords.value = [...new Set(lines)].join('\n');
    });

    document.getElementById('btn-enter-to-comma').addEventListener('click', () => {
        inputKeywords.value = inputKeywords.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean).join(',');
    });

    document.getElementById('btn-copy-input').addEventListener('click', () => {
        const text = inputKeywords.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean).join(',');
        if (!text) return alert('복사할 내용이 없습니다.');
        navigator.clipboard.writeText(text);
        alert('복사되었습니다.');
    });

    document.getElementById('btn-copy-output').addEventListener('click', () => {
        // HTML 서식을 제외한 순수 텍스트(Plain text)만 추출, 줄바꿈 등 보존
        const text = editableText.innerText.replace(/\u00A0/g, ' ');
        if (!text) return alert('복사할 내용이 없습니다.');
        
        navigator.clipboard.writeText(text).then(() => {
            alert('결과가 순수 텍스트로 복사되었습니다.');
        }).catch(err => {
            console.error('클립보드 복사 실패:', err);
            alert('복사에 실패했습니다.');
        });
    });

    // UI Sync & Caret Preservation Logic
    let isSyncing = false;
    let isComposing = false;

    function saveCaretPosition(el) {
        const selection = window.getSelection();
        if (selection.rangeCount === 0) return 0;
        const range = selection.getRangeAt(0);
        const preCaretRange = range.cloneRange();
        preCaretRange.selectNodeContents(el);
        preCaretRange.setEnd(range.endContainer, range.endOffset);
        return preCaretRange.toString().length;
    }

    function restoreCaretPosition(el, caretOffset) {
        const selection = window.getSelection();
        const range = document.createRange();
        let currentOffset = 0;
        let nodeStack = [el];
        let node, foundStart = false;

        while (!foundStart && (node = nodeStack.pop())) {
            if (node.nodeType === Node.TEXT_NODE) {
                const nextOffset = currentOffset + node.length;
                if (!foundStart && caretOffset >= currentOffset && caretOffset <= nextOffset) {
                    range.setStart(node, caretOffset - currentOffset);
                    range.setEnd(node, caretOffset - currentOffset);
                    foundStart = true;
                }
                currentOffset = nextOffset;
            } else {
                let i = node.childNodes.length;
                while (i--) nodeStack.push(node.childNodes[i]);
            }
        }

        if (foundStart) {
            selection.removeAllRanges();
            selection.addRange(range);
        }
    }

    function updateCharCount() {
        const len = editableText.textContent.length;
        charCount.textContent = `글자수: ${len}자`;
        if (len > 50) {
            charCount.classList.add('warning');
        } else {
            charCount.classList.remove('warning');
        }
    }

    function renderBlocks(words) {
        sortableList.innerHTML = '';
        words.forEach(word => {
            const div = document.createElement('div');
            div.className = 'word-block';
            div.textContent = word;
            sortableList.appendChild(div);
        });
    }

    // SortableJS setup
    new Sortable(sortableList, {
        animation: 150,
        ghostClass: 'word-block-ghost',
        onEnd: function () {
            if (isSyncing) return;
            isSyncing = true;
            const blocks = Array.from(sortableList.querySelectorAll('.word-block'));
            const words = blocks.map(b => b.textContent.trim());
            editableText.textContent = words.join(' ');
            updateCharCount();
            isSyncing = false;
        }
    });

    function syncFromText() {
        if (isSyncing || isComposing) return;
        isSyncing = true;
        
        const caretPos = saveCaretPosition(editableText);
        
        // Ensure no HTML formatting is injected, read pure text
        const text = editableText.textContent.replace(/[\u00A0\n]/g, ' ');
        const words = text.split(/\s+/).filter(Boolean);
        
        // Rewrite text completely to clean out any HTML elements
        editableText.textContent = text;
        
        restoreCaretPosition(editableText, caretPos);
        renderBlocks(words);
        updateCharCount();
        
        isSyncing = false;
    }

    // Handle IME composition (Korean)
    editableText.addEventListener('compositionstart', () => { isComposing = true; });
    editableText.addEventListener('compositionend', () => { 
        isComposing = false; 
        syncFromText(); 
    });
    editableText.addEventListener('input', syncFromText);
    
    // Prevent formatting pasting
    editableText.addEventListener('paste', function(e) {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text/plain');
        document.execCommand('insertText', false, text);
    });

    // AI Decomposition Logic
    document.getElementById('btn-ai-decompose').addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
            alert("API 키를 화면 상단에 입력해주세요.");
            return;
        }
        
        const rawKeywords = inputKeywords.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
        if (rawKeywords.length === 0) {
            alert("분해할 키워드를 입력해주세요.");
            return;
        }
        
        // --- Pre-processing (Dictionary Protection) ---
        const dictStr = protectedDictInput.value;
        const protectedWords = dictStr.split(',').map(w => w.trim()).filter(Boolean);
        // Sort by length descending to match longest words first
        protectedWords.sort((a, b) => b.length - a.length);
        
        const protectMap = {};
        protectedWords.forEach((pw, idx) => {
            protectMap[`__PROTECTED_${idx}__`] = pw;
        });
        
        const processedKeywords = rawKeywords.map(keyword => {
            let processed = keyword;
            protectedWords.forEach((pw, idx) => {
                const token = `__PROTECTED_${idx}__`;
                processed = processed.split(pw).join(token);
            });
            return processed;
        });
        // ----------------------------------------------
        
        loading.classList.add('active');
        
        const promptText = `주어진 한국어 키워드 배열을 이커머스 상품명 조합을 위해 '단일 핵심 명사' 단위로 완전히 분해해 줘. 특히 복합명사는 무조건 쪼개야 해. (예: '투명파일' -> '투명', '파일' / '서류정리파일' -> '서류', '정리', '파일'). 단, 'A4', 'B5' 같은 규격은 유지해. 단, '-개(예: 먼지털이개, 이쑤시개)', '-기(예: 청소기, 선풍기)', '-제(예: 방향제, 제습제)', '-용(예: 가정용, 캠핑용)' 같은 접미사나 의존명사가 결합된 단어는 절대로 쪼개지 말고 하나의 단어로 유지해. 입력된 배열과 1:1 대응되는 동일한 길이의 2차원 JSON 배열로만 응답해. 부가 설명이나 마크다운 없이 오직 JSON 배열 자체만 반환할 것.\n\n입력 데이터:\n${JSON.stringify(processedKeywords)}`;

        let finalWords = [];
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }],
                    generationConfig: { temperature: 0.1 }
                })
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();
            const textResponse = data.candidates[0].content.parts[0].text;
            
            // Regex to extract JSON array reliably
            const jsonMatch = textResponse.match(/\[\s*\[[\s\S]*\]\s*\]/);
            if (!jsonMatch) throw new Error("JSON 배열을 응답에서 찾을 수 없습니다.");
            
            const parsed2D = JSON.parse(jsonMatch[0]);
            let flatArray = parsed2D.flat();
            
            // --- Post-processing (Dictionary Restore) ---
            flatArray = flatArray.map(word => {
                let restored = word;
                Object.keys(protectMap).forEach(token => {
                    restored = restored.split(token).join(protectMap[token]);
                });
                return restored;
            });
            // --------------------------------------------
            
            // Remove duplicates while maintaining order
            finalWords = [...new Set(flatArray)];
            
        } catch (error) {
            console.error("API Error:", error);
            alert('API 통신 오류 또는 AI 응답 파싱 실패입니다. 개발자 도구(F12) 콘솔을 확인해주세요.');
            // Fallback: use original keywords
            finalWords = [...new Set(rawKeywords)];
        }
        
        loading.classList.remove('active');
        
        // Update UI
        isSyncing = true;
        renderBlocks(finalWords);
        editableText.textContent = finalWords.join(' ');
        updateCharCount();
        isSyncing = false;
    });

    // Initialize character count
    updateCharCount();
</script>
</body>
</html>
